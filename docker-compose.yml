services:
  twinlens:
    build: .
    ports:
      - "${TWINLENS_BIND:-127.0.0.1}:8000:8000"
    environment:
      TWINLENS_TOKEN: ${TWINLENS_TOKEN:?set TWINLENS_TOKEN}
      TWINLENS_KEY: ${TWINLENS_KEY:?set TWINLENS_KEY}
      TWINLENS_ACCEPT_THRESHOLD: ${TWINLENS_ACCEPT_THRESHOLD:-0.48}
      TWINLENS_MARGIN_THRESHOLD: ${TWINLENS_MARGIN_THRESHOLD:-0.06}
    volumes:
      - twinlens-data:/data
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    restart: unless-stopped
volumes:
  twinlens-data:
