<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TwinLens</title>
  <style>
    :root { font-family: system-ui, -apple-system, sans-serif; color: #172033; background: #f4f6f9; }
    body { margin: 0; } header { padding: 22px 18px; background: #172033; color: white; }
    header h1 { margin: 0 0 4px; font-size: 1.55rem; } header p { margin: 0; opacity: .8; }
    main { max-width: 760px; margin: auto; padding: 16px; display: grid; gap: 14px; }
    section { background: white; border-radius: 14px; padding: 16px; box-shadow: 0 2px 12px rgba(23,32,51,.08); }
    h2 { margin-top: 0; font-size: 1.12rem; } label { display: block; margin: 10px 0 5px; font-weight: 650; }
    input, select, button { width: 100%; box-sizing: border-box; font: inherit; padding: 11px; border-radius: 9px; border: 1px solid #cbd3df; }
    button { margin-top: 10px; border: 0; color: white; background: #2859d6; font-weight: 700; cursor: pointer; }
    button.secondary { background: #536071; } .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .status { padding: 10px; border-radius: 9px; background: #eef3ff; white-space: pre-wrap; overflow-wrap: anywhere; }
    .face { border: 1px solid #d9dfeb; border-radius: 10px; padding: 12px; margin-top: 10px; }
    .result { font-size: 1.25rem; font-weight: 800; } .muted { color: #5d6878; font-size: .9rem; }
    @media (max-width: 560px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<header><h1>TwinLens</h1><p>写真は保存せず、ローカルで顔特徴量を比較します。</p></header>
<main>
  <section><h2>接続設定</h2><label for="token">APIトークン</label><input id="token" type="password" autocomplete="off" placeholder=".env の TWINLENS_API_TOKEN"><button class="secondary" onclick="saveToken()">端末に保存</button><div id="health" class="status">未接続</div></section>
  <section><h2>初回登録</h2><p class="muted">各人20枚以上を推奨。登録画像は1枚につき顔が1つだけ必要です。</p><div class="grid"><div><label for="subject">人物</label><select id="subject"><option value="A">双子A</option><option value="B">双子B</option></select></div><div><label for="enrollFiles">写真</label><input id="enrollFiles" type="file" accept="image/jpeg,image/png,image/webp" multiple></div></div><button onclick="enroll()">登録する</button><div id="enrollStatus" class="status">未実行</div></section>
  <section><h2>写真を判定</h2><input id="identifyFile" type="file" accept="image/jpeg,image/png,image/webp"><button onclick="identify()">判定する</button><div id="results" class="status">未実行</div></section>
</main>
<script>
const labels={TWIN_A:'双子A',TWIN_B:'双子B',INDETERMINATE:'判定不能',OTHER_OR_NO_FACE:'双子以外、または顔を検出できない'};
const tokenInput=document.getElementById('token'); tokenInput.value=localStorage.getItem('twinlensToken')||'';
function saveToken(){localStorage.setItem('twinlensToken',tokenInput.value);check()} function headers(){return {'X-TwinLens-Token':tokenInput.value}}
async function jsonOrThrow(response){const body=await response.json();if(!response.ok)throw new Error(body.detail||response.statusText);return body}
async function check(){try{const h=await(await fetch('/api/v1/health')).json();const s=await jsonOrThrow(await fetch('/api/v1/stats',{headers:headers()}));document.getElementById('health').textContent=`接続済み\n登録数 A=${s.references.A} / B=${s.references.B}\nモデル: ${h.model}`}catch(e){document.getElementById('health').textContent=`接続失敗: ${e.message}`}}
async function enroll(){const files=document.getElementById('enrollFiles').files;if(!files.length)return;const data=new FormData();for(const file of files)data.append('files',file);const out=document.getElementById('enrollStatus');out.textContent='処理中…';try{const body=await jsonOrThrow(await fetch(`/api/v1/enroll/${document.getElementById('subject').value}`,{method:'POST',headers:headers(),body:data}));out.textContent=JSON.stringify(body,null,2);check()}catch(e){out.textContent=`失敗: ${e.message}`}}
async function identify(){const file=document.getElementById('identifyFile').files[0];if(!file)return;const data=new FormData();data.append('file',file);const out=document.getElementById('results');out.textContent='処理中…';try{const body=await jsonOrThrow(await fetch('/api/v1/identify',{method:'POST',headers:headers(),body:data}));render(body)}catch(e){out.textContent=`失敗: ${e.message}`}}
function render(body){const out=document.getElementById('results');out.innerHTML='';if(!body.faces.length){out.textContent=labels.OTHER_OR_NO_FACE;return}body.faces.forEach(face=>{const card=document.createElement('div');card.className='face';card.innerHTML=`<div class="result">${labels[face.label]||face.label}</div><div class="muted">A=${face.score_a} / B=${face.score_b} / 差=${face.margin}<br>品質=${face.quality} / 理由=${face.reason}</div>`;const select=document.createElement('select');[['A','双子A'],['B','双子B'],['INDETERMINATE','判定不能'],['OTHER','双子以外']].forEach(([v,t])=>{const o=document.createElement('option');o.value=v;o.textContent=t;select.appendChild(o)});const button=document.createElement('button');button.className='secondary';button.textContent='訂正を反映';button.onclick=async()=>{try{await jsonOrThrow(await fetch('/api/v1/corrections',{method:'POST',headers:{...headers(),'Content-Type':'application/json'},body:JSON.stringify({prediction_id:face.prediction_id,corrected_label:select.value,promote_to_reference:true})}));button.textContent='反映済み';check()}catch(e){button.textContent=`失敗: ${e.message}`}};card.append(select,button);out.appendChild(card)})}
check();
</script>
</body>
</html>
